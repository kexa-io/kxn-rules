[metadata]
version = "1.0.0"
provider = "vault"
description = "HashiCorp Vault secrets engine security rules"
tags = ["vault", "secrets", "kv", "pki", "security"]

[[rules]]
name = "vault-secrets-kv-v2-enabled"
description = "Ensure KV secrets engine uses version 2 for versioning support"
level = 1
object = "secrets_engine"

  [[rules.conditions]]
  operator = "OR"
  criteria = [
    { property = "type", condition = "DIFFERENT", value = "kv" },
    { property = "options.version", condition = "EQUAL", value = "2" },
  ]

[[rules]]
name = "vault-secrets-kv-max-versions"
description = "Ensure KV v2 max_versions is configured to limit storage growth"
level = 0
object = "kv_config"

  [[rules.conditions]]
  property = "max_versions"
  condition = "SUP"
  value = 0

[[rules]]
name = "vault-secrets-pki-max-ttl"
description = "Ensure PKI secrets engine max TTL is 1 year or less"
level = 2
object = "pki_role"

  [[rules.conditions]]
  property = "max_ttl"
  condition = "INF_OR_EQUAL"
  value = 31536000

[[rules]]
name = "vault-secrets-pki-enforce-hostnames"
description = "Ensure PKI roles enforce hostname verification"
level = 2
object = "pki_role"

  [[rules.conditions]]
  property = "enforce_hostnames"
  condition = "EQUAL"
  value = true

[[rules]]
name = "vault-secrets-pki-no-wildcard"
description = "Ensure PKI roles do not allow wildcard certificates by default"
level = 1
object = "pki_role"

  [[rules.conditions]]
  property = "allow_subdomains"
  condition = "EQUAL"
  value = false

[[rules]]
name = "vault-secrets-transit-min-key-size"
description = "Ensure Transit keys use at least 256-bit encryption"
level = 2
object = "transit_key"

  [[rules.conditions]]
  operator = "OR"
  criteria = [
    { property = "type", condition = "EQUAL", value = "aes256-gcm96" },
    { property = "type", condition = "EQUAL", value = "rsa-4096" },
    { property = "type", condition = "EQUAL", value = "ed25519" },
  ]

[[rules]]
name = "vault-secrets-transit-key-rotation"
description = "Ensure Transit keys have been rotated (more than 1 version)"
level = 1
object = "transit_key"

  [[rules.conditions]]
  property = "latest_version"
  condition = "SUP"
  value = 1

[[rules]]
name = "vault-secrets-transit-exportable-disabled"
description = "Ensure Transit keys are not exportable"
level = 2
object = "transit_key"

  [[rules.conditions]]
  property = "exportable"
  condition = "EQUAL"
  value = false

[[rules]]
name = "vault-secrets-default-lease-ttl"
description = "Ensure secrets engine default lease TTL is 1 hour or less"
level = 1
object = "secrets_engine"

  [[rules.conditions]]
  property = "config.default_lease_ttl"
  condition = "INF_OR_EQUAL"
  value = 3600

[[rules]]
name = "vault-secrets-database-max-ttl"
description = "Ensure database secrets engine max TTL is 24 hours or less"
level = 2
object = "database_role"

  [[rules.conditions]]
  property = "max_ttl"
  condition = "INF_OR_EQUAL"
  value = 86400
