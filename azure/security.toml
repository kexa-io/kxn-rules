# --- Security Center Configuration ---

[[rules]]
name = "azure-security-contact-email"
description = "Security Center should have a security contact email configured - Azure Policy: ASC_Security_contact_email"
level = 2
object = "azurerm_security_center_contact"
tags = ["monitoring", "cis-2.2.1", "soc2", "pci-dss", "nist"]

  [[rules.conditions]]
  property = "email"
  condition = "DIFFERENT"
  value = ""

[[rules]]
name = "azure-security-contact-phone"
description = "Security Center should have a security contact phone configured"
level = 1
object = "azurerm_security_center_contact"
tags = ["monitoring", "cis-2.2.2", "soc2"]

  [[rules.conditions]]
  property = "phone"
  condition = "DIFFERENT"
  value = ""

[[rules]]
name = "azure-security-alert-notifications"
description = "Security Center should send alert notifications to subscription owner - Azure Policy: ASC_Security_contact_notification"
level = 2
object = "azurerm_security_center_contact"
tags = ["monitoring", "cis-2.2.3", "soc2", "pci-dss"]

  [[rules.conditions]]
  property = "alert_notifications"
  condition = "EQUAL"
  value = true

[[rules]]
name = "azure-security-alerts-to-admins"
description = "Security Center should send alerts to admins - Azure Policy: ASC_Security_contact_send_to_admins"
level = 2
object = "azurerm_security_center_contact"
tags = ["monitoring", "cis-2.2.4", "soc2", "pci-dss"]

  [[rules.conditions]]
  property = "alerts_to_admins"
  condition = "EQUAL"
  value = true

[[rules]]
name = "azure-security-auto-provisioning"
description = "Auto provisioning of the Log Analytics agent should be enabled - Azure Policy: ASC_Automatic_provisioning_log_analytics_monitoring_agent"
level = 2
object = "azurerm_security_center_auto_provisioning"
tags = ["monitoring", "cis-2.2.5", "soc2", "nist"]

  [[rules.conditions]]
  property = "auto_provision"
  condition = "EQUAL"
  value = "On"

[[rules]]
name = "azure-security-adaptive-application-controls"
description = "Adaptive application controls should be enabled - Azure Policy: ASC_AdaptiveApplicationControls_Audit"
level = 1
object = "azurerm_security_center_setting"
tags = ["security", "cis-2.3", "soc2", "nist"]

  [[rules.conditions]]
  property = "enabled"
  condition = "EQUAL"
  value = true

[[rules]]
name = "azure-security-adaptive-network-hardening"
description = "Adaptive network hardening recommendations should be applied - Azure Policy: ASC_AdaptiveNetworkHardenings_Audit"
level = 1
object = "azurerm_security_center_setting"
tags = ["network-security", "cis-2.4", "soc2", "nist"]

  [[rules.conditions]]
  property = "enabled"
  condition = "EQUAL"
  value = true

[[rules]]
name = "azure-security-jit-access"
description = "Management ports of virtual machines should be protected with just-in-time access - Azure Policy: ASC_JITNetworkAccess_Audit"
level = 2
object = "azurerm_security_center_setting"
tags = ["network-security", "cis-2.5", "soc2", "pci-dss", "nist"]

  [[rules.conditions]]
  property = "enabled"
  condition = "EQUAL"
  value = true
