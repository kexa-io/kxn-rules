[metadata]
version = "1.0.0"
provider = "azurerm"
description = "Azure Security Center and Defender rules based on Azure Policy built-in definitions"
tags = ["azure", "security", "defender", "cis"]

# --- Microsoft Defender for Cloud ---

[[rules]]
name = "azure-defender-servers-enabled"
description = "Azure Defender for servers should be enabled - Azure Policy: ASC_EnableATPForServers_Audit"
level = 2
object = "azurerm_security_center_subscription_pricing"
tags = ["security", "cis-2.1.1", "soc2", "pci-dss", "nist"]

  [[rules.conditions]]
  operator = "AND"
  criteria = [
    { property = "resource_type", condition = "EQUAL", value = "VirtualMachines" },
    { property = "tier", condition = "EQUAL", value = "Standard" },
  ]

[[rules]]
name = "azure-defender-app-service-enabled"
description = "Azure Defender for App Service should be enabled - Azure Policy: ASC_EnableATPForAppServices_Audit"
level = 2
object = "azurerm_security_center_subscription_pricing"
tags = ["security", "cis-2.1.2", "soc2", "pci-dss"]

  [[rules.conditions]]
  operator = "AND"
  criteria = [
    { property = "resource_type", condition = "EQUAL", value = "AppServices" },
    { property = "tier", condition = "EQUAL", value = "Standard" },
  ]

