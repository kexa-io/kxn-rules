[metadata]
version = "1.0.0"
provider = "ssh"
description = "Package update monitoring rules for apt/yum/apk systems"
tags = ["ssh", "packages", "updates", "patching"]

[[rules]]
name = "ssh-no-pending-updates"
description = "Alert when packages are available for upgrade"
level = 1
object = "packages"
tags = ["patching"]

  [[rules.conditions]]
  property = "upgradable_count"
  condition = "EQUAL"
  value = 0

[[rules]]
name = "ssh-max-50-pending-updates"
description = "Critical alert when more than 50 packages need upgrading"
level = 2
object = "packages"
tags = ["patching", "critical"]

  [[rules.conditions]]
  property = "upgradable_count"
  condition = "INF"
  value = 50

[[rules]]
name = "ssh-no-security-updates-pending"
description = "Security-critical packages (openssl, libssl, openssh, sudo, kernel) should not have pending updates"
level = 2
object = "packages"
tags = ["security", "patching"]

  [[rules.conditions]]
  property = "packages"
  condition = "NOT_ANY"
  value = { property = "name", condition = "REGEX", value = "^(openssl|libssl|openssh|sudo|linux-image|kernel)" }
