[metadata]
version = "1.0.0"
provider = "kubernetes"
description = "Kubernetes secrets management and security rules"
tags = ["kubernetes", "secrets", "security", "encryption"]

[[rules]]
name = "k8s-secret-no-default-namespace"
description = "Ensure secrets are not stored in default namespace"
level = 2
object = "kubernetes_secret"
tags = ["namespace", "isolation", "best-practice"]

  [[rules.conditions]]
  property = "metadata.namespace"
  condition = "DIFFERENT"
  value = "default"

[[rules]]
name = "k8s-secret-type-opaque-avoid"
description = "Ensure secrets use specific type instead of Opaque when applicable"
level = 0
object = "kubernetes_secret"
tags = ["typing", "governance"]

  [[rules.conditions]]
  property = "type"
  condition = "DIFFERENT"
  value = ""

[[rules]]
name = "k8s-secret-no-env-exposure"
description = "Ensure secrets are mounted as volumes, not exposed as environment variables"
level = 1
object = "kubernetes_secret"
tags = ["exposure", "best-practice", "hardening"]

  [[rules.conditions]]
  property = "metadata.annotations.secret-management/mount-type"
  condition = "EQUAL"
  value = "volume"

[[rules]]
name = "k8s-secret-labels-present"
description = "Ensure secrets have proper labels for management"
level = 1
object = "kubernetes_secret"
tags = ["governance", "labels", "management"]

  [[rules.conditions]]
  property = "metadata.labels"
  condition = "DIFFERENT"
  value = ""

[[rules]]
name = "k8s-secret-no-wildcard-rbac"
description = "Ensure no RBAC role grants wildcard access to secrets"
level = 3
object = "kubernetes_secret"
tags = ["rbac", "access-control", "least-privilege", "soc2"]

  [[rules.conditions]]
  property = "metadata.annotations.rbac-audit/wildcard-access"
  condition = "DIFFERENT"
  value = "true"

[[rules]]
name = "k8s-secret-rotation-annotated"
description = "Ensure secrets have rotation timestamp annotation"
level = 1
object = "kubernetes_secret"
tags = ["rotation", "lifecycle", "compliance"]

  [[rules.conditions]]
  property = "metadata.annotations.secret-management/last-rotated"
  condition = "DIFFERENT"
  value = ""

[[rules]]
name = "k8s-secret-managed-by-external"
description = "Ensure secrets are managed by external secrets operator"
level = 1
object = "kubernetes_secret"
tags = ["external-secrets", "management", "best-practice"]

  [[rules.conditions]]
  operator = "OR"
  criteria = [
    { property = "metadata.labels.app.kubernetes.io/managed-by", condition = "EQUAL", value = "external-secrets" },
    { property = "metadata.labels.app.kubernetes.io/managed-by", condition = "EQUAL", value = "sealed-secrets" },
    { property = "metadata.labels.app.kubernetes.io/managed-by", condition = "EQUAL", value = "vault" },
  ]

[[rules]]
name = "k8s-secret-immutable"
description = "Ensure secrets are marked as immutable when possible"
level = 0
object = "kubernetes_secret"
tags = ["immutability", "hardening"]

  [[rules.conditions]]
  property = "immutable"
  condition = "EQUAL"
  value = true

[[rules]]
name = "k8s-secret-no-tls-self-signed"
description = "Ensure TLS secrets do not use self-signed certificates in production"
level = 2
object = "kubernetes_secret"
tags = ["tls", "certificates", "trust"]

  [[rules.conditions]]
  property = "metadata.annotations.cert-manager.io/issuer-kind"
  condition = "DIFFERENT"
  value = "SelfSigned"

[[rules]]
name = "k8s-secret-size-limit"
description = "Ensure secrets do not exceed 1MB size limit"
level = 1
object = "kubernetes_secret"
tags = ["size", "performance", "etcd"]

  [[rules.conditions]]
  property = "metadata.annotations.secret-management/size-bytes"
  condition = "INF"
  value = 1048576
