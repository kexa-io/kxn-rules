[metadata]
version = "1.0.0"
provider = "google"
description = "GCP Cloud DNS security rules based on CIS GCP Foundations Benchmark and Forseti policies"
tags = ["gcp", "dns", "dnssec", "security", "cis"]

# --- CIS 3.3 - DNSSEC Enabled ---

[[rules]]
name = "gcp-dns-dnssec-enabled"
description = "CIS 3.3 - Ensure DNSSEC is enabled for Cloud DNS managed zones"
level = 2
object = "google_dns_managed_zone"
tags = ["cis-3.3", "soc2", "nist", "dns", "forseti"]

  [[rules.conditions]]
  property = "dnssec_config.0.state"
  condition = "EQUAL"
  value = "on"

# --- CIS 3.4 - DNSSEC Key-Signing Key Algorithm ---

[[rules]]
name = "gcp-dns-dnssec-ksk-no-rsasha1"
description = "CIS 3.4 - Ensure RSASHA1 is not used for the key-signing key in DNSSEC"
level = 2
object = "google_dns_managed_zone"
tags = ["cis-3.4", "soc2", "nist", "dns", "forseti"]

  [[rules.conditions]]
  property = "dnssec_config.0.default_key_specs.0.algorithm"
  condition = "DIFFERENT"
  value = "rsasha1"

# --- CIS 3.5 - DNSSEC Zone-Signing Key Algorithm ---

[[rules]]
name = "gcp-dns-dnssec-zsk-no-rsasha1"
description = "CIS 3.5 - Ensure RSASHA1 is not used for the zone-signing key in DNSSEC"
level = 2
object = "google_dns_managed_zone"
tags = ["cis-3.5", "soc2", "nist", "dns", "forseti"]

  [[rules.conditions]]
  property = "dnssec_config.0.default_key_specs.1.algorithm"
  condition = "DIFFERENT"
  value = "rsasha1"

# --- DNS Managed Zone Visibility ---

[[rules]]
name = "gcp-dns-private-zone-preferred"
description = "Ensure DNS managed zones use private visibility where possible"
level = 0
object = "google_dns_managed_zone"
tags = ["soc2", "network"]

  [[rules.conditions]]
  property = "visibility"
  condition = "EQUAL"
  value = "private"

# --- DNS Managed Zone Logging ---

[[rules]]
name = "gcp-dns-zone-logging-enabled"
description = "Ensure DNS managed zone query logging is enabled for audit trail"
level = 1
object = "google_dns_managed_zone"
tags = ["soc2", "audit", "dns"]

  [[rules.conditions]]
  property = "cloud_logging_config.0.enable_logging"
  condition = "EQUAL"
  value = true
