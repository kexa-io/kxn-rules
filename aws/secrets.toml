[metadata]
version = "1.0.0"
provider = "aws"
description = "AWS Secrets Manager and SSM Parameter Store security rules based on AWS Config managed rules"
tags = ["aws", "secrets-manager", "ssm", "secrets", "security"]

# --- Secrets Manager Rules ---

# --- Rule 1 ---
[[rules]]
name = "aws-secretsmanager-rotation-enabled"
description = "Ensure Secrets Manager secrets have automatic rotation enabled - AWS Config: SECRETSMANAGER_ROTATION_ENABLED_CHECK"
level = 2
object = "aws_secretsmanager_secret"
tags = ["cis-2.4", "pci-dss", "soc2", "nist"]

  [[rules.conditions]]
  property = "rotation_enabled"
  condition = "EQUAL"
  value = true

# --- Rule 2 ---
[[rules]]
name = "aws-secretsmanager-secret-periodic-rotation"
description = "Ensure Secrets Manager secrets are rotated within 90 days - AWS Config: SECRETSMANAGER_SECRET_PERIODIC_ROTATION"
level = 2
object = "aws_secretsmanager_secret_rotation"
tags = ["pci-dss", "soc2", "nist"]

  [[rules.conditions]]
  property = "rotation_rules.0.automatically_after_days"
  condition = "INF_OR_EQUAL"
  value = 90

# --- Rule 3 ---
[[rules]]
name = "aws-secretsmanager-using-cmk"
description = "Ensure Secrets Manager secrets are encrypted with a customer-managed KMS key - AWS Config: SECRETSMANAGER_USING_CMK"
level = 2
object = "aws_secretsmanager_secret"
tags = ["pci-dss", "hipaa", "soc2", "nist"]

  [[rules.conditions]]
  property = "kms_key_id"
  condition = "DIFFERENT"
  value = ""

# --- Rule 4 ---
[[rules]]
name = "aws-secretsmanager-secret-unused"
description = "Ensure Secrets Manager secrets are actively being used (accessed within 90 days) - AWS Config: SECRETSMANAGER_SECRET_UNUSED"
level = 1
object = "aws_secretsmanager_secret"
tags = ["soc2", "aws-well-architected", "hygiene"]

  [[rules.conditions]]
  property = "last_accessed_date"
  condition = "DATE_SUP"
  value = "-90d"

# --- Rule 5 ---
[[rules]]
name = "aws-secretsmanager-scheduled-rotation-success"
description = "Ensure Secrets Manager scheduled rotation completes successfully - AWS Config: SECRETSMANAGER_SCHEDULED_ROTATION_SUCCESS_CHECK"
level = 2
object = "aws_secretsmanager_secret"
tags = ["soc2", "nist"]

  [[rules.conditions]]
  property = "rotation_enabled"
  condition = "EQUAL"
  value = true

# --- SSM Parameter Store Rules ---

# --- Rule 6 ---
[[rules]]
name = "aws-ssm-parameter-encrypted"
description = "Ensure SSM parameters use SecureString type for sensitive data"
level = 2
object = "aws_ssm_parameter"
tags = ["pci-dss", "hipaa", "soc2", "nist"]

  [[rules.conditions]]
  property = "type"
  condition = "EQUAL"
  value = "SecureString"

# --- Rule 7 ---
[[rules]]
name = "aws-ssm-parameter-kms-encrypted"
description = "Ensure SSM SecureString parameters are encrypted with a customer-managed KMS key"
level = 2
object = "aws_ssm_parameter"
tags = ["pci-dss", "hipaa", "soc2"]

  [[rules.conditions]]
  property = "key_id"
  condition = "DIFFERENT"
  value = ""

# --- Rule 8 ---
[[rules]]
name = "aws-ssm-parameter-tagged"
description = "Ensure SSM parameters have required tags for governance and cost allocation"
level = 1
object = "aws_ssm_parameter"
tags = ["soc2", "aws-well-architected", "governance"]

  [[rules.conditions]]
  property = "tags"
  condition = "DIFFERENT"
  value = ""
