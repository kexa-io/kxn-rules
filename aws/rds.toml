[metadata]
version = "1.0.0"
provider = "aws"
description = "AWS RDS database security rules based on AWS Config managed rules and CIS AWS Foundations Benchmark"
tags = ["aws", "rds", "security", "database"]

# --- Rule 1 ---
[[rules]]
name = "aws-rds-instance-public-access-check"
description = "Ensure RDS instances are not publicly accessible - AWS Config: RDS_INSTANCE_PUBLIC_ACCESS_CHECK"
level = 3
object = "aws_db_instance"
tags = ["cis-2.3.1", "pci-dss", "hipaa", "soc2", "nist"]

  [[rules.conditions]]
  property = "publicly_accessible"
  condition = "EQUAL"
  value = false

# --- Rule 2 ---
[[rules]]
name = "aws-rds-storage-encrypted"
description = "Ensure RDS instances have storage encryption enabled - AWS Config: RDS_STORAGE_ENCRYPTED"
level = 3
object = "aws_db_instance"
tags = ["cis-2.3.1", "pci-dss", "hipaa", "soc2", "nist"]

  [[rules.conditions]]
  property = "storage_encrypted"
  condition = "EQUAL"
  value = true

# --- Rule 3 ---
[[rules]]
name = "aws-rds-multi-az-support"
description = "Ensure RDS instances are configured for Multi-AZ deployment - AWS Config: RDS_MULTI_AZ_SUPPORT"
level = 2
object = "aws_db_instance"
tags = ["soc2", "aws-well-architected", "availability"]

  [[rules.conditions]]
  property = "multi_az"
  condition = "EQUAL"
  value = true

# --- Rule 4 ---
[[rules]]
name = "aws-rds-instance-backup-enabled"
description = "Ensure RDS automated backups are enabled with sufficient retention - AWS Config: DB_INSTANCE_BACKUP_ENABLED"
level = 2
object = "aws_db_instance"
tags = ["cis-2.3.1", "soc2", "hipaa", "backup"]

  [[rules.conditions]]
  property = "backup_retention_period"
  condition = "SUP_OR_EQUAL"
  value = 7

# --- Rule 5 ---
[[rules]]
name = "aws-rds-instance-deletion-protection-enabled"
description = "Ensure RDS instance has deletion protection enabled - AWS Config: RDS_INSTANCE_DELETION_PROTECTION_ENABLED"
level = 2
object = "aws_db_instance"
tags = ["soc2", "aws-well-architected"]

  [[rules.conditions]]
  property = "deletion_protection"
  condition = "EQUAL"
  value = true

# --- Rule 6 ---
[[rules]]
name = "aws-rds-instance-iam-authentication-enabled"
description = "Ensure RDS instance has IAM database authentication enabled - AWS Config: RDS_INSTANCE_IAM_AUTHENTICATION_ENABLED"
level = 2
object = "aws_db_instance"
tags = ["soc2", "nist", "aws-well-architected"]

  [[rules.conditions]]
  property = "iam_database_authentication_enabled"
  condition = "EQUAL"
  value = true

# --- Rule 7 ---
[[rules]]
name = "aws-rds-automatic-minor-version-upgrade-enabled"
description = "Ensure RDS automatic minor version upgrade is enabled - AWS Config: RDS_AUTOMATIC_MINOR_VERSION_UPGRADE_ENABLED"
level = 1
object = "aws_db_instance"
tags = ["soc2", "aws-well-architected", "patching"]

  [[rules.conditions]]
  property = "auto_minor_version_upgrade"
  condition = "EQUAL"
  value = true

# --- Rule 8 ---
[[rules]]
name = "aws-rds-instance-default-admin-check"
description = "Ensure RDS instance does not use default admin username - AWS Config: RDS_INSTANCE_DEFAULT_ADMIN_CHECK"
level = 2
object = "aws_db_instance"
tags = ["pci-dss", "soc2"]

  [[rules.conditions]]
  operator = "AND"
  criteria = [
    { property = "username", condition = "DIFFERENT", value = "admin" },
    { property = "username", condition = "DIFFERENT", value = "postgres" },
    { property = "username", condition = "DIFFERENT", value = "root" },
    { property = "username", condition = "DIFFERENT", value = "master" },
  ]

# --- Rule 9 ---
[[rules]]
name = "aws-rds-snapshots-public-prohibited"
description = "Ensure RDS snapshots are not publicly accessible - AWS Config: RDS_SNAPSHOTS_PUBLIC_PROHIBITED"
level = 3
object = "aws_db_snapshot"
tags = ["pci-dss", "hipaa", "soc2", "nist"]

  [[rules.conditions]]
  property = "shared_accounts"
  condition = "NOT_INCLUDE"
  value = "all"

# --- Rule 10 ---
[[rules]]
name = "aws-rds-logging-enabled"
description = "Ensure RDS instance has logging enabled - AWS Config: RDS_LOGGING_ENABLED"
level = 2
object = "aws_db_instance"
tags = ["soc2", "nist", "monitoring"]

  [[rules.conditions]]
  property = "enabled_cloudwatch_logs_exports"
  condition = "DIFFERENT"
  value = ""

# --- Rule 11 ---
[[rules]]
name = "aws-rds-enhanced-monitoring-enabled"
description = "Ensure RDS enhanced monitoring is enabled - AWS Config: RDS_ENHANCED_MONITORING_ENABLED"
level = 1
object = "aws_db_instance"
tags = ["soc2", "aws-well-architected", "monitoring"]

  [[rules.conditions]]
  property = "monitoring_interval"
  condition = "SUP"
  value = 0

# --- Rule 12 ---
[[rules]]
name = "aws-rds-cluster-deletion-protection-enabled"
description = "Ensure RDS Aurora cluster has deletion protection enabled - AWS Config: RDS_CLUSTER_DELETION_PROTECTION_ENABLED"
level = 2
object = "aws_rds_cluster"
tags = ["soc2", "aws-well-architected"]

  [[rules.conditions]]
  property = "deletion_protection"
  condition = "EQUAL"
  value = true

# --- Rule 13 ---
[[rules]]
name = "aws-rds-cluster-encrypted-at-rest"
description = "Ensure RDS Aurora cluster is encrypted at rest - AWS Config: RDS_CLUSTER_ENCRYPTED_AT_REST"
level = 3
object = "aws_rds_cluster"
tags = ["pci-dss", "hipaa", "soc2", "nist"]

  [[rules.conditions]]
  property = "storage_encrypted"
  condition = "EQUAL"
  value = true

# --- Rule 14 ---
[[rules]]
name = "aws-rds-cluster-multi-az-enabled"
description = "Ensure RDS Aurora cluster is deployed across multiple AZs - AWS Config: RDS_CLUSTER_MULTI_AZ_ENABLED"
level = 2
object = "aws_rds_cluster"
tags = ["soc2", "aws-well-architected", "availability"]

  [[rules.conditions]]
  property = "availability_zones"
  condition = "DIFFERENT"
  value = ""

# --- Rule 15 ---
[[rules]]
name = "aws-rds-snapshot-encrypted"
description = "Ensure RDS snapshots are encrypted - AWS Config: RDS_SNAPSHOT_ENCRYPTED"
level = 2
object = "aws_db_snapshot"
tags = ["pci-dss", "hipaa", "soc2"]

  [[rules.conditions]]
  property = "encrypted"
  condition = "EQUAL"
  value = true
