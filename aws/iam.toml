[metadata]
version = "1.0.0"
provider = "aws"
description = "AWS IAM security rules based on AWS Config managed rules and CIS AWS Foundations Benchmark"
tags = ["aws", "iam", "security", "cis"]

# --- Rule 1 ---
[[rules]]
name = "aws-iam-root-access-key-check"
description = "Ensure root account does not have access keys - AWS Config: IAM_ROOT_ACCESS_KEY_CHECK"
level = 3
object = "aws_iam_account_password_policy"
tags = ["cis-1.4", "pci-dss", "hipaa", "soc2", "nist"]

  [[rules.conditions]]
  property = "root_access_keys_present"
  condition = "EQUAL"
  value = false

# --- Rule 2 ---
[[rules]]
name = "aws-iam-user-mfa-enabled"
description = "Ensure MFA is enabled for all IAM users with console access - AWS Config: IAM_USER_MFA_ENABLED"
level = 3
object = "aws_iam_user"
tags = ["cis-1.10", "pci-dss", "hipaa", "soc2", "nist"]

  [[rules.conditions]]
  property = "mfa_enabled"
  condition = "EQUAL"
  value = true

# --- Rule 3 ---
[[rules]]
name = "aws-iam-root-account-mfa-enabled"
description = "Ensure root account has MFA enabled - AWS Config: ROOT_ACCOUNT_MFA_ENABLED"
level = 3
object = "aws_iam_account_password_policy"
tags = ["cis-1.5", "pci-dss", "hipaa", "soc2", "nist"]

  [[rules.conditions]]
  property = "root_mfa_enabled"
  condition = "EQUAL"
  value = true

# --- Rule 4 ---
[[rules]]
name = "aws-iam-root-account-hardware-mfa-enabled"
description = "Ensure root account uses hardware MFA device - AWS Config: ROOT_ACCOUNT_HARDWARE_MFA_ENABLED"
level = 2
object = "aws_iam_account_password_policy"
tags = ["cis-1.6", "pci-dss", "soc2"]

  [[rules.conditions]]
  property = "root_hardware_mfa_enabled"
  condition = "EQUAL"
  value = true

# --- Rule 5 ---
[[rules]]
name = "aws-iam-access-keys-rotated"
description = "Ensure IAM access keys are rotated within 90 days - AWS Config: ACCESS_KEYS_ROTATED"
level = 2
object = "aws_iam_access_key"
tags = ["cis-1.14", "pci-dss", "soc2", "nist"]

  [[rules.conditions]]
  property = "create_date"
  condition = "DATE_SUP"
  value = "-90d"

# --- Rule 6 ---
[[rules]]
name = "aws-iam-user-no-policies-check"
description = "Ensure IAM policies are not attached directly to users - AWS Config: IAM_USER_NO_POLICIES_CHECK"
level = 2
object = "aws_iam_user_policy"
tags = ["cis-1.15", "soc2", "aws-well-architected"]

  [[rules.conditions]]
  property = "policy"
  condition = "EQUAL"
  value = ""

# --- Rule 7 ---
[[rules]]
name = "aws-iam-no-inline-policy-check"
description = "Ensure IAM users, roles, and groups do not have inline policies - AWS Config: IAM_NO_INLINE_POLICY_CHECK"
level = 2
object = "aws_iam_role"
tags = ["soc2", "aws-well-architected"]

  [[rules.conditions]]
  property = "inline_policy"
  condition = "EQUAL"
  value = ""

# --- Rule 8 ---
[[rules]]
name = "aws-iam-policy-no-admin-access"
description = "Ensure IAM policies do not grant full admin access (*:*) - AWS Config: IAM_POLICY_NO_STATEMENTS_WITH_ADMIN_ACCESS"
level = 3
object = "aws_iam_policy"
tags = ["cis-1.16", "pci-dss", "hipaa", "soc2", "nist"]

  [[rules.conditions]]
  operator = "AND"
  criteria = [
    { property = "policy", condition = "NOT_INCLUDE", value = "\"Action\":\"*\"" },
    { property = "policy", condition = "NOT_INCLUDE", value = "\"Resource\":\"*\"" },
  ]

# --- Rule 9 ---
[[rules]]
name = "aws-iam-policy-no-full-access"
description = "Ensure IAM policies do not grant full access to any service - AWS Config: IAM_POLICY_NO_STATEMENTS_WITH_FULL_ACCESS"
level = 2
object = "aws_iam_policy"
tags = ["soc2", "nist", "aws-well-architected"]

  [[rules.conditions]]
  property = "policy"
  condition = "NOT_INCLUDE"
  value = "\"Action\":\"*\""

# --- Rule 10 ---
[[rules]]
name = "aws-iam-user-unused-credentials-check"
description = "Ensure IAM credentials unused for 90+ days are disabled - AWS Config: IAM_USER_UNUSED_CREDENTIALS_CHECK"
level = 2
object = "aws_iam_user"
tags = ["cis-1.12", "pci-dss", "soc2", "nist"]

  [[rules.conditions]]
  property = "last_login_date"
  condition = "DATE_SUP"
  value = "-90d"

# --- Rule 11 ---
[[rules]]
name = "aws-iam-user-group-membership-check"
description = "Ensure every IAM user belongs to at least one IAM group - AWS Config: IAM_USER_GROUP_MEMBERSHIP_CHECK"
level = 1
object = "aws_iam_user"
tags = ["cis-1.15", "soc2"]

  [[rules.conditions]]
  property = "groups"
  condition = "DIFFERENT"
  value = ""

# --- Rule 12 ---
[[rules]]
name = "aws-iam-group-has-users-check"
description = "Ensure IAM groups contain at least one user - AWS Config: IAM_GROUP_HAS_USERS_CHECK"
level = 0
object = "aws_iam_group"
tags = ["soc2", "aws-well-architected"]

  [[rules.conditions]]
  property = "users"
  condition = "DIFFERENT"
  value = ""

# --- Rule 13 ---
[[rules]]
name = "aws-iam-password-policy-min-length"
description = "Ensure IAM password policy requires minimum 14 characters - AWS Config: IAM_PASSWORD_POLICY"
level = 2
object = "aws_iam_account_password_policy"
tags = ["cis-1.8", "pci-dss", "soc2", "nist"]

  [[rules.conditions]]
  property = "minimum_password_length"
  condition = "SUP_OR_EQUAL"
  value = 14

# --- Rule 14 ---
[[rules]]
name = "aws-iam-password-policy-require-symbols"
description = "Ensure IAM password policy requires at least one symbol - AWS Config: IAM_PASSWORD_POLICY"
level = 2
object = "aws_iam_account_password_policy"
tags = ["cis-1.8", "pci-dss", "soc2"]

  [[rules.conditions]]
  property = "require_symbols"
  condition = "EQUAL"
  value = true

# --- Rule 15 ---
[[rules]]
name = "aws-iam-password-policy-require-numbers"
description = "Ensure IAM password policy requires at least one number - AWS Config: IAM_PASSWORD_POLICY"
level = 2
object = "aws_iam_account_password_policy"
tags = ["cis-1.8", "pci-dss", "soc2"]

  [[rules.conditions]]
  property = "require_numbers"
  condition = "EQUAL"
  value = true

# --- Rule 16 ---
[[rules]]
name = "aws-iam-password-policy-require-uppercase"
description = "Ensure IAM password policy requires uppercase characters - AWS Config: IAM_PASSWORD_POLICY"
level = 2
object = "aws_iam_account_password_policy"
tags = ["cis-1.8", "pci-dss", "soc2"]

  [[rules.conditions]]
  property = "require_uppercase_characters"
  condition = "EQUAL"
  value = true

# --- Rule 17 ---
[[rules]]
name = "aws-iam-password-policy-require-lowercase"
description = "Ensure IAM password policy requires lowercase characters - AWS Config: IAM_PASSWORD_POLICY"
level = 2
object = "aws_iam_account_password_policy"
tags = ["cis-1.8", "pci-dss", "soc2"]

  [[rules.conditions]]
  property = "require_lowercase_characters"
  condition = "EQUAL"
  value = true

# --- Rule 18 ---
[[rules]]
name = "aws-iam-password-policy-prevent-reuse"
description = "Ensure IAM password policy prevents password reuse (last 24) - AWS Config: IAM_PASSWORD_POLICY"
level = 2
object = "aws_iam_account_password_policy"
tags = ["cis-1.9", "pci-dss", "soc2", "nist"]

  [[rules.conditions]]
  property = "password_reuse_prevention"
  condition = "SUP_OR_EQUAL"
  value = 24

# --- Rule 19 ---
[[rules]]
name = "aws-iam-password-policy-max-age"
description = "Ensure IAM password policy expires passwords within 90 days - AWS Config: IAM_PASSWORD_POLICY"
level = 2
object = "aws_iam_account_password_policy"
tags = ["cis-1.10", "pci-dss", "soc2"]

  [[rules.conditions]]
  property = "max_password_age"
  condition = "INF_OR_EQUAL"
  value = 90

# --- Rule 20 ---
[[rules]]
name = "aws-iam-external-access-analyzer-enabled"
description = "Ensure IAM Access Analyzer is enabled for external access analysis - AWS Config: IAM_EXTERNAL_ACCESS_ANALYZER_ENABLED"
level = 2
object = "aws_accessanalyzer_analyzer"
tags = ["cis-1.20", "soc2", "nist", "aws-well-architected"]

  [[rules.conditions]]
  property = "type"
  condition = "EQUAL"
  value = "ACCOUNT"
